<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Create Account | Mommy's Kitchen</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:      #0d0d0d;
      --surface: #1a1a1a;
      --surface2:#222;
      --border:  rgba(255,255,255,0.08);
      --accent:  #e8943a;
      --text:    #f0f0f0;
      --muted:   #777;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 20px; position: relative; overflow: hidden;
    }

    body::before, body::after {
      content: ''; position: fixed; border-radius: 50%;
      filter: blur(90px); opacity: 0.15; pointer-events: none; z-index: 0;
    }
    body::before {
      width: 500px; height: 500px; background: var(--accent);
      top: -160px; left: -160px;
    }
    body::after {
      width: 400px; height: 400px; background: #c0392b;
      bottom: -120px; right: -120px;
    }

    .back-link {
      position: fixed; top: 24px; left: 28px; z-index: 10;
      color: var(--muted); text-decoration: none;
      font-size: 0.85rem; display: flex; align-items: center; gap: 6px;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--accent); }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px 40px;
      width: 100%; max-width: 460px;
      position: relative; z-index: 1;
      box-shadow: 0 30px 80px rgba(0,0,0,0.5);
    }

    /* Progress bar */
    .progress-wrap { margin-bottom: 32px; }
    .progress-label {
      display: flex; justify-content: space-between;
      font-size: 0.72rem; color: var(--muted);
      margin-bottom: 8px; letter-spacing: 0.5px;
    }
    .progress-label span.active { color: var(--accent); font-weight: 600; }
    .progress-track {
      height: 4px; background: var(--border); border-radius: 4px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; width: 50%;
      background: linear-gradient(90deg, var(--accent), #d4782a);
      border-radius: 4px;
    }

    /* Brand */
    .brand { text-align: center; margin-bottom: 28px; }
    .brand-icon {
      width: 60px; height: 60px;
      background: linear-gradient(135deg, var(--accent), #c0392b);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; margin: 0 auto 12px;
      box-shadow: 0 8px 24px rgba(232,148,58,0.3);
    }
    .brand h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem; font-weight: 700;
    }
    .brand h2 span { color: var(--accent); }
    .brand p { color: var(--muted); font-size: 0.82rem; margin-top: 5px; }

    .role-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(232,148,58,0.12); color: var(--accent);
      border: 1px solid rgba(232,148,58,0.25);
      border-radius: 20px; padding: 4px 14px;
      font-size: 0.72rem; font-weight: 600;
      letter-spacing: 0.5px; margin-bottom: 10px;
    }

    /* Divider */
    .divider {
      display: flex; align-items: center; gap: 12px; margin-bottom: 24px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }
    .divider span { color: var(--muted); font-size: 0.72rem; letter-spacing: 1px; }

    /* Name row */
    .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

    /* Form */
    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block; font-size: 0.75rem; font-weight: 500;
      color: var(--muted); margin-bottom: 7px;
      letter-spacing: 0.5px; text-transform: uppercase;
    }
    .input-wrap { position: relative; }
    .input-wrap i.ico {
      position: absolute; left: 14px; top: 50%;
      transform: translateY(-50%);
      color: var(--muted); font-size: 0.85rem; pointer-events: none;
    }
    .input-wrap input {
      width: 100%; padding: 13px 16px 13px 40px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 12px; color: var(--text);
      font-family: 'Poppins', sans-serif;
      font-size: 0.9rem; outline: none;
      transition: border-color 0.25s, background 0.25s;
    }
    .input-wrap input:focus {
      border-color: var(--accent);
      background: rgba(232,148,58,0.05);
    }
    .input-wrap input::placeholder { color: #3a3a3a; }
    .eye-btn {
      position: absolute; right: 13px; top: 50%;
      transform: translateY(-50%);
      color: var(--muted); cursor: pointer; font-size: 0.85rem;
      transition: color 0.2s;
    }
    .eye-btn:hover { color: var(--accent); }

    /* Password strength */
    .strength-bar {
      display: flex; gap: 4px; margin-top: 8px;
    }
    .strength-bar span {
      flex: 1; height: 3px; border-radius: 3px;
      background: var(--border); transition: background 0.3s;
    }
    .strength-bar span.weak   { background: #e74c3c; }
    .strength-bar span.medium { background: var(--accent); }
    .strength-bar span.strong { background: #2ed573; }

    /* Submit */
    .btn-next {
      width: 100%; padding: 15px;
      background: linear-gradient(135deg, var(--accent), #d4782a);
      color: #0d0d0d;
      font-family: 'Poppins', sans-serif;
      font-size: 0.95rem; font-weight: 700;
      border: none; border-radius: 12px;
      cursor: pointer; margin-top: 10px;
      letter-spacing: 0.5px;
      transition: opacity 0.25s, transform 0.2s, box-shadow 0.25s;
      box-shadow: 0 6px 20px rgba(232,148,58,0.3);
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-next:hover {
      opacity: 0.92; transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(232,148,58,0.45);
    }
    .btn-next:active { transform: translateY(0); }

    .form-foot {
      text-align: center; margin-top: 20px;
      font-size: 0.82rem; color: var(--muted);
    }
    .form-foot a {
      color: var(--accent); text-decoration: none; font-weight: 500;
    }
    .form-foot a:hover { text-decoration: underline; }

    @media (max-width: 480px) {
      .card { padding: 36px 20px; }
      .row-2 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <a href="Clogin.html" class="back-link">
    <i class="fa fa-arrow-left"></i> Back to Login
  </a>

  <div class="card">

    <!-- Progress -->
    <div class="progress-wrap">
      <div class="progress-label">
        <span class="active">Step 1 — Account Info</span>
        <span>Step 2 — Contact Details</span>
      </div>
      <div class="progress-track"><div class="progress-fill"></div></div>
    </div>

    <div class="brand">
      <div class="brand-icon">🍛</div>
      <div class="role-badge"><i class="fa fa-user"></i> &nbsp;NEW CUSTOMER</div>
      <h2>Create Your <span>Account</span></h2>
      <p>Join Mommy's Kitchen — takes less than a minute!</p>
    </div>

    <div class="divider"><span>ACCOUNT DETAILS</span></div>

    <form action="creg1" method="post">

      <!-- First & Last Name -->
      <div class="row-2">
        <div class="form-group">
          <label>First Name</label>
          <div class="input-wrap">
            <i class="fa fa-id-card ico"></i>
            <input type="text" name="cfname" placeholder="John" required/>
          </div>
        </div>
        <div class="form-group">
          <label>Last Name</label>
          <div class="input-wrap">
            <i class="fa fa-id-card ico"></i>
            <input type="text" name="clname" placeholder="Doe" required/>
          </div>
        </div>
      </div>

      <!-- Username -->
      <div class="form-group">
        <label>Username</label>
        <div class="input-wrap">
          <i class="fa fa-user ico"></i>
          <input type="text" name="cuname" placeholder="Choose a username" required/>
        </div>
      </div>

      <!-- Password -->
      <div class="form-group">
        <label>Password</label>
        <div class="input-wrap">
          <i class="fa fa-lock ico"></i>
          <input type="password" name="cpword" id="passField"
                 placeholder="Create a strong password"
                 oninput="checkStrength(this.value)" required/>
          <i class="fa fa-eye eye-btn" id="eyeIcon" onclick="togglePass()"></i>
        </div>
        <div class="strength-bar">
          <span id="s1"></span><span id="s2"></span><span id="s3"></span>
        </div>
      </div>

      <button type="submit" class="btn-next">
        Next Step &nbsp;<i class="fa fa-arrow-right"></i>
      </button>
    </form>

    <div class="form-foot">
      Already have an account? &nbsp;<a href="Clogin.html">Sign In</a>
    </div>
  </div>

  <script>
    function togglePass() {
      const f = document.getElementById('passField');
      const e = document.getElementById('eyeIcon');
      f.type = f.type === 'password' ? 'text' : 'password';
      e.classList.toggle('fa-eye'); e.classList.toggle('fa-eye-slash');
    }
    function checkStrength(v) {
      const s = [document.getElementById('s1'), document.getElementById('s2'), document.getElementById('s3')];
      s.forEach(x => x.className = '');
      if (v.length === 0) return;
      if (v.length >= 4) s[0].className = 'weak';
      if (v.length >= 7) s[1].className = 'medium';
      if (v.length >= 10 && /[A-Z]/.test(v) && /[0-9]/.test(v)) s[2].className = 'strong';
    }
  </script>

</body>
</html>

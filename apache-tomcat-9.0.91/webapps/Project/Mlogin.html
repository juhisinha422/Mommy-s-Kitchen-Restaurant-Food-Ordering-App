<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Manager Login | Mommy's Kitchen</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:      #0d0d0d;
      --surface: #1a1a1a;
      --border:  rgba(255,255,255,0.08);
      --accent:  #e8943a;
      --red:     #c0392b;
      --text:    #f0f0f0;
      --muted:   #777;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    /* Ambient blobs */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.15;
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      width: 500px; height: 500px;
      background: var(--red);
      top: -160px; right: -160px;
    }
    body::after {
      width: 400px; height: 400px;
      background: var(--accent);
      bottom: -120px; left: -120px;
    }

    /* Back link */
    .back-link {
      position: fixed; top: 24px; left: 28px; z-index: 10;
      color: var(--muted); text-decoration: none;
      font-size: 0.85rem;
      display: flex; align-items: center; gap: 6px;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--accent); }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px 40px;
      width: 100%; max-width: 420px;
      position: relative; z-index: 1;
      box-shadow: 0 30px 80px rgba(0,0,0,0.5);
    }

    /* Brand */
    .brand { text-align: center; margin-bottom: 32px; }
    .brand-icon {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, var(--red), #922b21);
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.6rem;
      margin: 0 auto 14px;
      box-shadow: 0 8px 24px rgba(192,57,43,0.35);
    }
    .brand h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem; font-weight: 700;
    }
    .brand h2 span { color: var(--accent); }
    .brand p { color: var(--muted); font-size: 0.82rem; margin-top: 6px; }

    .role-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(192,57,43,0.12);
      color: #e74c3c;
      border: 1px solid rgba(192,57,43,0.25);
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 0.72rem; font-weight: 600;
      letter-spacing: 0.5px; margin-bottom: 10px;
    }

    /* Divider */
    .divider {
      display: flex; align-items: center; gap: 12px; margin-bottom: 26px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }
    .divider span { color: var(--muted); font-size: 0.72rem; letter-spacing: 1px; }

    /* Form */
    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block; font-size: 0.75rem; font-weight: 500;
      color: var(--muted); margin-bottom: 8px;
      letter-spacing: 0.5px; text-transform: uppercase;
    }
    .input-wrap { position: relative; }
    .input-wrap i.ico {
      position: absolute; left: 15px; top: 50%;
      transform: translateY(-50%);
      color: var(--muted); font-size: 0.88rem; pointer-events: none;
    }
    .input-wrap input {
      width: 100%;
      padding: 13px 16px 13px 42px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: 'Poppins', sans-serif;
      font-size: 0.9rem; outline: none;
      transition: border-color 0.25s, background 0.25s;
    }
    .input-wrap input:focus {
      border-color: var(--red);
      background: rgba(192,57,43,0.05);
    }
    .input-wrap input::placeholder { color: #3a3a3a; }
    .eye-btn {
      position: absolute; right: 14px; top: 50%;
      transform: translateY(-50%);
      color: var(--muted); cursor: pointer; font-size: 0.88rem;
      transition: color 0.2s;
    }
    .eye-btn:hover { color: var(--accent); }

    /* Submit */
    .btn-login {
      width: 100%; padding: 15px;
      background: linear-gradient(135deg, var(--red), #922b21);
      color: #fff;
      font-family: 'Poppins', sans-serif;
      font-size: 0.95rem; font-weight: 600;
      border: none; border-radius: 12px;
      cursor: pointer; margin-top: 8px;
      letter-spacing: 0.5px;
      transition: opacity 0.25s, transform 0.2s, box-shadow 0.25s;
      box-shadow: 0 6px 20px rgba(192,57,43,0.35);
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-login:hover {
      opacity: 0.9; transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(192,57,43,0.5);
    }
    .btn-login:active { transform: translateY(0); }

    /* Footer links */
    .form-foot {
      text-align: center; margin-top: 22px;
      font-size: 0.82rem; color: var(--muted);
    }
    .form-foot a {
      color: var(--accent); text-decoration: none; font-weight: 500;
    }
    .form-foot a:hover { text-decoration: underline; }

    @media (max-width: 480px) {
      .card { padding: 36px 22px; }
    }
  </style>
</head>
<body>

  <a href="welcome.html" class="back-link">
    <i class="fa fa-arrow-left"></i> Back to Home
  </a>

  <div class="card">
    <div class="brand">
      <div class="brand-icon">👨‍🍳</div>
      <div class="role-badge"><i class="fa fa-user-tie"></i> &nbsp;MANAGER</div>
      <h2>Mommy's <span>Kitchen</span></h2>
      <p>Manager portal — sign in to manage orders</p>
    </div>

    <div class="divider"><span>MANAGER LOGIN</span></div>

    <form action="log" method="post">

      <div class="form-group">
        <label>Username</label>
        <div class="input-wrap">
          <i class="fa fa-user ico"></i>
          <input type="text" name="uname" placeholder="Enter manager username" required/>
        </div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="input-wrap">
          <i class="fa fa-lock ico"></i>
          <input type="password" name="pword" id="passField" placeholder="Enter your password" required/>
          <i class="fa fa-eye eye-btn" id="eyeIcon" onclick="togglePass()"></i>
        </div>
      </div>

      <button type="submit" class="btn-login">
        <i class="fa fa-right-to-bracket"></i> Login to Dashboard
      </button>
    </form>

    <div class="form-foot">
      New manager? &nbsp;<a href="input1.html">Register here</a>
    </div>
    <div class="form-foot" style="margin-top:10px;">
      Are you a customer? &nbsp;<a href="Clogin.html">Customer Login →</a>
    </div>
  </div>

  <script>
    function togglePass() {
      const f = document.getElementById('passField');
      const e = document.getElementById('eyeIcon');
      if (f.type === 'password') {
        f.type = 'text';
        e.classList.replace('fa-eye','fa-eye-slash');
      } else {
        f.type = 'password';
        e.classList.replace('fa-eye-slash','fa-eye');
      }
    }
  </script>

</body>
</html>
